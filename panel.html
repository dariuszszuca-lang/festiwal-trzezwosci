<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Panel — Festiwal Trzeźwości</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: #f4f1ea; color: #1a1a1a; padding: 24px; }
.wrap { max-width: 1100px; margin: 0 auto; }
h1 { font-family: 'DM Serif Display', serif; font-size: 32px; margin-bottom: 4px; }
.sub { color: #666; font-size: 14px; margin-bottom: 24px; }
.login { background: #fff; border-radius: 12px; padding: 32px; max-width: 400px; margin: 80px auto; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.login h1 { font-size: 24px; margin-bottom: 16px; text-align: center; }
.login input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; margin-bottom: 12px; font-family: inherit; }
.login input:focus { outline: none; border-color: #0D4F4F; }
.login button { width: 100%; padding: 14px; background: #0D4F4F; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; }
.login button:hover { background: #1A8F8F; }
.err { color: #c00; font-size: 14px; margin-top: 8px; min-height: 20px; }
.bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
.btn { background: #0D4F4F; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 14px; }
.btn:hover { background: #1A8F8F; }
.btn-light { background: #fff; color: #0D4F4F; border: 2px solid #0D4F4F; }
.btn-light:hover { background: #0D4F4F; color: #fff; }
.stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
.stat { background: #fff; padding: 16px 24px; border-radius: 12px; flex: 1; min-width: 180px; }
.stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin-bottom: 4px; }
.stat-val { font-size: 28px; font-weight: 700; color: #0D4F4F; }
table { width: 100%; background: #fff; border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
th { background: #0D4F4F; color: #fff; padding: 14px 16px; text-align: left; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
td { padding: 14px 16px; border-bottom: 1px solid #f0eee8; font-size: 15px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #faf8f3; }
.empty { text-align: center; padding: 60px 20px; color: #888; }
.tag { display: inline-block; padding: 3px 10px; border-radius: 999px; background: #e8f5e9; color: #2e7d32; font-size: 12px; font-weight: 600; }
.checkbox { width: 18px; height: 18px; cursor: pointer; }
@media print {
  body { background: #fff; padding: 0; }
  .login, .bar, .stats button, .btn { display: none !important; }
  table { box-shadow: none; }
  th { background: #1a1a1a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .stats { page-break-inside: avoid; }
  h1 { font-size: 22px; }
  td, th { font-size: 12px; padding: 8px 10px; }
}
</style>
</head>
<body>
<div class="wrap">

<div id="loginBox" class="login">
  <h1>Panel Festiwal</h1>
  <input type="password" id="pwd" placeholder="Hasło" autocomplete="off">
  <button onclick="login()">Wejdź</button>
  <div class="err" id="loginErr"></div>
</div>

<div id="dashboard" style="display:none">
  <h1>Lista kupujących</h1>
  <div class="sub">III Festiwal Trzeźwości MyWay · 8 sierpnia 2026, Kąpino</div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Kupujących</div><div class="stat-val" id="statBuyers">0</div></div>
    <div class="stat"><div class="stat-label">Biletów</div><div class="stat-val" id="statTickets">0</div></div>
    <div class="stat"><div class="stat-label">Przychód</div><div class="stat-val" id="statRevenue">0 zł</div></div>
  </div>

  <div class="bar">
    <button class="btn" onclick="load()">↻ Odśwież</button>
    <button class="btn btn-light" onclick="window.print()">🖨 Drukuj listę</button>
    <button class="btn btn-light" onclick="exportCSV()">⬇ Pobierz CSV</button>
    <span style="color:#666;font-size:13px;margin-left:auto" id="lastUpdate"></span>
  </div>

  <table>
    <thead>
      <tr>
        <th style="width:40px">✓</th>
        <th>Imię i nazwisko</th>
        <th>Email</th>
        <th>Telefon</th>
        <th>Bilety</th>
        <th>Kwota</th>
        <th>Data zakupu</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="empty" class="empty" style="display:none">Brak kupujących na razie.</div>
</div>

</div>

<script>
let PWD = sessionStorage.getItem('festPwd') || '';
let DATA = null;

function login() {
  const v = document.getElementById('pwd').value.trim();
  if (!v) return;
  PWD = v;
  sessionStorage.setItem('festPwd', v);
  document.getElementById('loginErr').textContent = '';
  load();
}

async function load() {
  if (!PWD) return;
  try {
    const res = await fetch('/api/buyers', { headers: { 'X-Admin-Password': PWD } });
    if (res.status === 401) {
      sessionStorage.removeItem('festPwd');
      PWD = '';
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginErr').textContent = 'Nieprawidłowe hasło';
      return;
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    render();
  } catch (e) {
    alert('Błąd: ' + e.message);
  }
}

function render() {
  document.getElementById('statBuyers').textContent = DATA.count;
  document.getElementById('statTickets').textContent = DATA.totalTickets;
  document.getElementById('statRevenue').textContent = DATA.totalRevenue.toFixed(0) + ' zł';
  const tbody = document.getElementById('rows');
  if (!DATA.buyers.length) {
    tbody.innerHTML = '';
    document.getElementById('empty').style.display = 'block';
  } else {
    document.getElementById('empty').style.display = 'none';
    tbody.innerHTML = DATA.buyers.map(b => `
      <tr>
        <td><input type="checkbox" class="checkbox"></td>
        <td><strong>${escapeHtml(b.name)}</strong></td>
        <td>${escapeHtml(b.email)}</td>
        <td>${escapeHtml(b.phone || '-')}</td>
        <td>${b.quantity}</td>
        <td>${b.amount.toFixed(0)} zł</td>
        <td>${formatDate(b.created)}</td>
      </tr>
    `).join('');
  }
  document.getElementById('lastUpdate').textContent = 'Aktualizacja: ' + new Date().toLocaleTimeString('pl-PL');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDate(unix) {
  const d = new Date(unix * 1000);
  return d.toLocaleString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function exportCSV() {
  if (!DATA?.buyers?.length) return;
  const rows = [
    ['Imię i nazwisko', 'Email', 'Telefon', 'Bilety', 'Kwota PLN', 'Data zakupu'],
    ...DATA.buyers.map(b => [b.name, b.email, b.phone || '', b.quantity, b.amount.toFixed(2), formatDate(b.created)])
  ];
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `festiwal-bilety-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

document.getElementById('pwd').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });

if (PWD) load();
else document.getElementById('loginBox').style.display = 'block';
</script>
</body>
</html>
